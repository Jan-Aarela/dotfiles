$Color1 = rgb(8be9fd)
$Color2 = rgb(50fa7b)
$Color3 = rgb(ff5555)
# $Color1 = rgb(180, 190, 254)
# $Color2 = rgb(148, 226, 213)
# $Color3 = rgb(243, 139, 168)


general {
    ignore_empty_input = true
    immediate_render = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    bezier = easeOutQuint,0.25,1,0.25,1.05
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 1, linear

    animation = inputFieldColors,1 ,1, linear
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 3
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $Color1
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = $Color1
    fade_on_empty = false
    rounding = 8
    check_color = $Color    
    placeholder_text = <i>Input Password...</i>
    fail_text = <i>sus ඞ</i>
    fail_color = $Color3
    check_color = $Color2
    font_family = JetBrainsMono Nerd Font
    hide_input = false
    position = -32, -230
    halign = center
    valign = center
    shadow_passes = 1
}


# Whoami
label {
    monitor =
    text = cmd[update:1000] echo "$(whoami)"
    color = $Color1
    font_size = 22
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -150
    halign = center
    valign = center
}


# Language 
label {
    text = cmd[update:100] hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) | .active_keymap' | cut -c1-2 | tr 'A-Z' 'a-z'
    font_family = JetBrainsMono Nerd Font
    font_size = 20
    position = 170,-230
    color = $Color1
}

# Language box
shape {
    size = 64,64
    border_size = 3
    border_color = $Color1
    color = rgba(0, 0, 0, 0.5)
    position = 170, -230
    rounding = 8
    shadow_passes = 1
    onclick = hyprctl switchxkblayout current next
}


# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $Color1
    font_size = 22
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 300
    halign = center
    valign = center
}

# TIME
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $Color1
    font_size = 95
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 200
    halign = center
    valign = center
}

# Profile Picture
